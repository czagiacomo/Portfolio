<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Projeto Portfólio">
	<meta name="author" content="Catharina Zagiacomo">
	<meta name="keywords" content="HTML, CSS, JavaScript">
	<link rel="icon" type="image/svg" href="./assets/img/favicon_01.svg" />
	<link rel="stylesheet" href="./assets/css/style.css">
	<title>Meu Perfil</title>
</head>

<body>
	<div id="header"></div>

	<main>
		<div id="contact" class="flex">
			<form id="formulario" action="#" method="submit">
				<label for="nome">Nome: </label>
				<input id="nome" type="text" name="name" placeholder="Digite seu nome" required />
				<span id="txtNome"></span>
				<label for="email">Email: </label>
				<input id="email" type="email" name="email" placeholder="Digite seu email" required />
				<span id="txtEmail"></span>
				<label for="subject">Assunto: </label>
				<input id="subject" type="text" name="subject" placeholder="Digite o título da mensagem" required />
				<span id="txtSubject"></span>
				<label for="message">Mensagem: </label>
				<textarea id="message" name="message" placeholder="Digite sua mensagem" required></textarea>
				<button type="submit">Enviar</button>
			</form>
			<section id="mapa" class="flex_start">
				<div id="endereco">
					<p>São Paulo</p>
					<p>SP, Brasil</p>
				</div>
				<iframe
					src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d467690.14386865456!2d-46.92495573160536!3d-23.682063556622076!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce448183a461d1%3A0x9ba94b08ff335bae!2zU8OjbyBQYXVsbywgU1A!5e0!3m2!1spt-BR!2sbr!4v1736442754716!5m2!1spt-BR!2sbr"
					width="400" height="250" frameborder="0" style="border: 0" allowfullscreen="" aria-hidden="false"
					tabindex="0" id="mapa">
				</iframe>
			</section>
		</div>
	</main>
	
	<div id="footer"></div>
	
	<script src="./assets/js/header-loader.js"></script>
	<script src="./assets/js/footer-loader.js"></script>

	<script src="./assets/js/script.js"></script>

</body>

</html>
